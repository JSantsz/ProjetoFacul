<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Clínica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eef2f5;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
      text-align: center;
    }

    .card h2 {
      margin-bottom: 10px;
      color: #333;
    }

    .card p {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
      display: block;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.2s;
    }

   input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }
    

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00a2ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00cbfd;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #00a2ff;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2>Área exclusiva</h2>
    <p>Acesse sua</p>

    <form method="POST" action="/login">

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha" required>
      </div>

      <button class="btn" type="submit">Entrar</button>
    </form>

    <div class="links">
      <p>Não tem conta? <a href="/register">Cadastre-se</a></p>
    </div>
  </div>

</body>
</html>
