<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consultas</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 120px;

  /* 🔥 IMAGEM AJUSTADA */
  background: url("{{ url_for('static', filename='images/consultas.jpg') }}") no-repeat;
  background-size: cover;
  background-position: center 80%;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
}

/* card */
.container {
  position: relative;
  z-index: 1;
  background: white;
  padding: 40px;
  border-radius: 16px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

.container h2 {
  margin-bottom: 20px;
}

/* inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* botão */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(120deg,#0072ff,#00c6ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

</style>
</head>

<body>

<div class="container">
  <h2>Agendar Consulta</h2>

  <form>
    <input type="text" placeholder="Seu nome">
    <input type="email" placeholder="Seu email">

    <select>
      <option>Escolha o profissional</option>
      <option>Psicólogo</option>
      <option>Terapeuta</option>
    </select>

    <input type="date">

    <button type="submit">Agendar</button>
  </form>
</div>

</body>
</html>
